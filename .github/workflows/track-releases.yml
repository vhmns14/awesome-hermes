name: Track Releases

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Fetch latest Hermes releases
        run: python scripts/fetch_releases.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/releases.json; then
            git add data/releases.json
            git commit -m "chore: update tracked Hermes releases"
            git push
          else
            echo "No changes"
          fi
